<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-label="欧规雷达卖家交流群 占位二维码">
  <title>欧规雷达卖家交流群 占位二维码</title>
  <desc>正式二维码待运营替换。本占位图用 ASCII 风格提示用户扫码联系 + 邮箱 i@weiread.com。</desc>

  <!-- 背景 -->
  <rect x="0" y="0" width="200" height="200" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>

  <!-- 三个定位角 -->
  <g fill="#0f172a">
    <!-- 左上 -->
    <rect x="14" y="14" width="36" height="36"/>
    <rect x="20" y="20" width="24" height="24" fill="#ffffff"/>
    <rect x="26" y="26" width="12" height="12"/>
    <!-- 右上 -->
    <rect x="150" y="14" width="36" height="36"/>
    <rect x="156" y="20" width="24" height="24" fill="#ffffff"/>
    <rect x="162" y="26" width="12" height="12"/>
    <!-- 左下 -->
    <rect x="14" y="150" width="36" height="36"/>
    <rect x="20" y="156" width="24" height="24" fill="#ffffff"/>
    <rect x="26" y="162" width="12" height="12"/>
  </g>

  <!-- 装饰模块(模拟数据点) -->
  <g fill="#0f172a">
    <rect x="60" y="20" width="6" height="6"/>
    <rect x="72" y="20" width="6" height="6"/>
    <rect x="84" y="20" width="6" height="6"/>
    <rect x="108" y="20" width="6" height="6"/>
    <rect x="120" y="20" width="6" height="6"/>
    <rect x="132" y="20" width="6" height="6"/>

    <rect x="60" y="32" width="6" height="6"/>
    <rect x="84" y="32" width="6" height="6"/>
    <rect x="96" y="32" width="6" height="6"/>
    <rect x="120" y="32" width="6" height="6"/>
    <rect x="132" y="32" width="6" height="6"/>

    <rect x="60" y="44" width="6" height="6"/>
    <rect x="72" y="44" width="6" height="6"/>
    <rect x="96" y="44" width="6" height="6"/>
    <rect x="108" y="44" width="6" height="6"/>
    <rect x="132" y="44" width="6" height="6"/>

    <rect x="60" y="56" width="6" height="6"/>
    <rect x="84" y="56" width="6" height="6"/>
    <rect x="108" y="56" width="6" height="6"/>
    <rect x="120" y="56" width="6" height="6"/>
    <rect x="132" y="56" width="6" height="6"/>

    <rect x="60" y="68" width="6" height="6"/>
    <rect x="72" y="68" width="6" height="6"/>
    <rect x="84" y="68" width="6" height="6"/>
    <rect x="96" y="68" width="6" height="6"/>
    <rect x="120" y="68" width="6" height="6"/>
  </g>

  <!-- 中心文字(扫码加群 + 邮箱) -->
  <g>
    <rect x="36" y="92" width="128" height="36" fill="#ffffff"/>
    <text x="100" y="106" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="700" fill="#0f172a">扫码加群</text>
    <text x="100" y="122" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#475569">i@weiread.com</text>
  </g>

  <!-- 下方脚注 -->
  <text x="100" y="180" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#64748b">占位图 · 正式二维码待替换</text>
</svg>
